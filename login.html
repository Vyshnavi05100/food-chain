{% extends "base.html" %}

{% block content %}
<div class="card glass auth-form">
    <h2 style="font-size: 2.2rem; margin-bottom: 2rem; color: var(--primary);">Login</h2>
    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">Log In</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Don't have an account? <a href="{{ url_for('signup') }}"
            style="color: var(--primary); text-decoration: none;">Sign up here</a>
    </p>
</div>
{% endblock %}
